<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Lista de Contactos</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="container mx-auto p-5">

<h1 class="text-3xl font-bold mb-6">
Lista de Contactos
</h1>

<div class="overflow-x-auto">

<table class="w-full bg-white shadow rounded">

<thead class="bg-blue-600 text-white">

<tr>

<th class="p-3">ID</th>
<th class="p-3">Nombre</th>
<th class="p-3">Correo</th>
<th class="p-3">Teléfono</th>
<th class="p-3">Fecha Registro</th>

</tr>

</thead>

<tbody>

{% for contact in contacts %}

<tr class="border-b">

<td class="p-3">{{ contact.id }}</td>
<td class="p-3">{{ contact.fullname }}</td>
<td class="p-3">{{ contact.email }}</td>
<td class="p-3">{{ contact.phone }}</td>
<td class="p-3">{{ contact.created_at }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

<a
href="/"
class="inline-block mt-5 bg-gray-700 text-white px-4 py-2 rounded">

Volver

</a>

</div>

</body>
</html>
